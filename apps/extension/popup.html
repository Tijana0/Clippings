<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 200px;
      padding: 15px;
      background-color: #F2F2DF; /* clippings-cream */
      color: #8C4637; /* clippings-brown */
      font-family: sans-serif;
      text-align: center;
      border: 3px solid #8C4637;
    }
    h2 {
      font-size: 18px;
      margin-top: 0;
    }
    button {
      background-color: #F2A7C3; /* clippings-pink */
      color: #8C4637;
      border: 2px solid #8C4637;
      padding: 10px 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 3px 3px 0px 0px #8C4637;
      width: 100%;
    }
    button:active {
      box-shadow: 0px 0px 0px 0px #8C4637;
      transform: translate(2px, 2px);
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h2>Clippings</h2>
  <button id="clipBtn">CLIP THIS PAGE</button>
  <div id="status" class="status">Ready to scrap!</div>
  <script src="popup.js"></script>
</body>
</html>
